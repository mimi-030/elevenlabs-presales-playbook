<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ art.title }} | Meridian Financial</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@600;900&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{--paper:#FBFAF6;--ink:#17202E;--rule:#D8D4C8;--up:#C8102E;--muted:#6B7280}
  *{box-sizing:border-box;margin:0}
  body{background:var(--paper);color:var(--ink);
       font-family:"Inter",system-ui,sans-serif;line-height:1.9}
  .masthead{max-width:680px;margin:0 auto;padding:26px 20px 10px;
            border-bottom:3px double var(--ink)}
  .masthead a{font-family:"Noto Serif",Georgia,serif;font-weight:900;font-size:19px;
              letter-spacing:.16em;color:var(--ink);text-decoration:none}
  .masthead a span{color:var(--up)}
  main{max-width:680px;margin:0 auto;padding:30px 20px 70px}
  h1{font-family:"Noto Serif",Georgia,serif;font-weight:900;font-size:30px;
     line-height:1.45}
  .meta{margin:14px 0 22px;font-size:13px;color:var(--muted);
        display:flex;gap:14px}

  /* Signature element: a ticker-tape style player with a red LISTEN stamp. */
  .ticker{display:flex;align-items:center;gap:0;border:1.5px solid var(--ink);
          border-radius:3px;overflow:hidden;margin-bottom:30px;background:#fff}
  .ticker .tag{background:var(--up);color:#fff;font-weight:700;font-size:13px;
               letter-spacing:.2em;padding:12px 14px;white-space:nowrap}
  .ticker audio{flex:1;height:40px;margin:0 8px}
  .noaudio{border:1.5px dashed var(--rule);border-radius:3px;color:var(--muted);
           font-size:13px;padding:12px 14px;margin-bottom:30px}
  .body p{font-size:17px;text-align:justify;margin-bottom:1.2em}
  .back{font-size:13px}
  .back a{color:var(--up)}
</style>
</head>
<body>
  <header class="masthead"><a href="/">MERIDIAN<span>&nbsp;Financial</span></a></header>
  <main>
    <h1>{{ art.title }}</h1>
    <div class="meta"><span>{{ art.author }}</span><span>{{ art.date }}</span></div>

    {% if audio %}
      <div class="ticker">
        <span class="tag">&#9673; LISTEN</span>
        <audio controls preload="metadata" src="{{ audio }}"></audio>
      </div>
    {% else %}
      <div class="noaudio">No audio yet. The reader page only ever serves a file that
        already exists &mdash; generation is triggered by the publish flow on the editor side.</div>
    {% endif %}

    <div class="body"><p>{{ art.body }}</p></div>
    <p class="back"><a href="/">&larr; Back to front page</a></p>
  </main>
</body>
</html>
